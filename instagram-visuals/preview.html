<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lua — Instagram Visuals Preview</title>
  <style>
    body {
      background: #111;
      margin: 0;
      padding: 40px;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      color: #999;
    }
    h1 {
      font-weight: 300;
      letter-spacing: 6px;
      color: #e0e0e0;
      text-align: center;
      font-size: 14px;
      margin-bottom: 10px;
    }
    p.subtitle {
      text-align: center;
      font-size: 12px;
      color: #666;
      letter-spacing: 2px;
      margin-bottom: 50px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
      gap: 30px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .card {
      background: #0a0a1a;
      border-radius: 4px;
      overflow: hidden;
    }
    .card img {
      width: 100%;
      height: auto;
      display: block;
    }
    .card .label {
      padding: 16px 20px;
      font-size: 11px;
      letter-spacing: 3px;
      color: #666;
      border-top: 1px solid #1a1a2e;
    }
  </style>
</head>
<body>
  <h1>LUA INSTAGRAM VISUALS</h1>
  <p class="subtitle">AESOP-INSPIRED MINIMAL SERIES</p>
  <div class="grid">
    <div class="card">
      <img src="01-brand-intro.svg" alt="Brand Introduction">
      <div class="label">01 — BRAND INTRODUCTION</div>
    </div>
    <div class="card">
      <img src="02-privacy-manifesto.svg" alt="Privacy Manifesto">
      <div class="label">02 — PRIVACY MANIFESTO</div>
    </div>
    <div class="card">
      <img src="03-minimal-moon.svg" alt="Minimal Moon">
      <div class="label">03 — MINIMAL MOON</div>
    </div>
    <div class="card">
      <img src="04-features-minimal.svg" alt="Features">
      <div class="label">04 — ESSENTIALS LIST</div>
    </div>
    <div class="card">
      <img src="05-poetic-close.svg" alt="Poetic Close">
      <div class="label">05 — POETIC CLOSE</div>
    </div>
    <div class="card">
      <img src="06-typography-only.svg" alt="Typography">
      <div class="label">06 — TYPOGRAPHY STATEMENT</div>
    </div>
  </div>
</body>
</html>

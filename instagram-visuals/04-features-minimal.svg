<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1080" fill="#0a0a1a"/>

  <!-- Subtle border -->
  <rect x="80" y="80" width="920" height="920" fill="none" stroke="#c97a7a" stroke-width="0.3" opacity="0.2"/>

  <!-- Header -->
  <text x="540" y="240" font-family="'Cormorant Garamond', 'Georgia', serif" font-size="16" font-weight="300" fill="#c97a7a" text-anchor="middle" letter-spacing="8" opacity="0.7">ESSENTIALS</text>

  <!-- Feature list - Aesop ingredient-list style -->
  <text x="540" y="400" font-family="'Cormorant Garamond', 'Georgia', serif" font-size="26" font-weight="300" fill="#e0e0e0" text-anchor="middle" letter-spacing="3">Cycle Logging</text>
  <line x1="460" y1="420" x2="620" y2="420" stroke="#666" stroke-width="0.3"/>

  <text x="540" y="480" font-family="'Cormorant Garamond', 'Georgia', serif" font-size="26" font-weight="300" fill="#e0e0e0" text-anchor="middle" letter-spacing="3">Personal Journal</text>
  <line x1="440" y1="500" x2="640" y2="500" stroke="#666" stroke-width="0.3"/>

  <text x="540" y="560" font-family="'Cormorant Garamond', 'Georgia', serif" font-size="26" font-weight="300" fill="#e0e0e0" text-anchor="middle" letter-spacing="3">Local-Only Storage</text>
  <line x1="430" y1="580" x2="650" y2="580" stroke="#666" stroke-width="0.3"/>

  <text x="540" y="640" font-family="'Cormorant Garamond', 'Georgia', serif" font-size="26" font-weight="300" fill="#e0e0e0" text-anchor="middle" letter-spacing="3">Complete Privacy</text>
  <line x1="440" y1="660" x2="640" y2="660" stroke="#666" stroke-width="0.3"/>

  <text x="540" y="720" font-family="'Cormorant Garamond', 'Georgia', serif" font-size="26" font-weight="300" fill="#e0e0e0" text-anchor="middle" letter-spacing="3">Zero Accounts</text>

  <!-- Bottom -->
  <text x="540" y="900" font-family="'Cormorant Garamond', 'Georgia', serif" font-size="14" font-weight="300" fill="#666" text-anchor="middle" letter-spacing="4">NOTHING MORE. NOTHING LESS.</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1080" fill="#0a0a1a"/>

  <!-- Crescent moon - minimal line art -->
  <circle cx="540" cy="440" r="120" fill="none" stroke="#c97a7a" stroke-width="0.8" opacity="0.5"/>
  <circle cx="580" cy="440" r="110" fill="#0a0a1a" stroke="none"/>

  <!-- Text below moon -->
  <text x="540" y="660" font-family="'Cormorant Garamond', 'Georgia', serif" font-size="28" font-weight="300" fill="#e0e0e0" text-anchor="middle" letter-spacing="6">in rhythm with you</text>

  <!-- Brand bottom -->
  <text x="540" y="940" font-family="'Cormorant Garamond', 'Georgia', serif" font-size="14" font-weight="300" fill="#666" text-anchor="middle" letter-spacing="6">LUA CYCLE TRACKER</text>
</svg>
